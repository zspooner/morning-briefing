name: Daily Briefings

on:
  schedule:
    # Morning: 8am ET = 12:00 UTC (EDT)
    - cron: '0 12 * * *'
    # Afternoon: 4:15pm ET = 20:15 UTC (EDT), weekdays only
    - cron: '15 20 * * 1-5'
  workflow_dispatch:
    inputs:
      briefing_type:
        description: 'Which briefing to send'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - afternoon
          - both

jobs:
  morning-briefing:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 12 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.briefing_type == 'morning' || github.event.inputs.briefing_type == 'both'))

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send morning briefing
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python briefing.py --send

  afternoon-briefing:
    runs-on: ubuntu-latest
    if: github.event.schedule == '15 20 * * 1-5' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.briefing_type == 'afternoon' || github.event.inputs.briefing_type == 'both'))

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send afternoon market summary
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python afternoon_briefing.py --send
